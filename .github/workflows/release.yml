name: Release

# Triggers when you push a version tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build DMG & publish release
    runs-on: macos-14

    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build DMG
        run: bash scripts/build-dmg.sh

      # Extract "1.2.3" from the tag "v1.2.3"
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Bump CFBundleVersion in Info.plist inside the already-built app
      - name: Stamp version into bundle
        run: |
          plist="dist/ClipHistory.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleVersion ${{ steps.version.outputs.version }}" "$plist"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$plist"
          # Re-sign after modifying the bundle
          codesign --force --deep --sign - dist/ClipHistory.app

      # Rebuild the DMG with the stamped bundle
      - name: Repack DMG
        run: |
          rm -f dist/ClipHistory.dmg
          STAGING="$(mktemp -d)"
          cp -r dist/ClipHistory.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "ClipHistory" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            -o dist/ClipHistory.dmg
          rm -rf "$STAGING"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ClipHistory ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: dist/ClipHistory.dmg
          generate_release_notes: true   # auto-fills changelog from commits
          fail_on_unmatched_files: true
